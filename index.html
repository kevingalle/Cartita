<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Para mi hermosa novia ❤️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #fbf3ee;
    --paper-2: #f6e9e2;
    --wine: #7c3a42;
    --wine-deep: #5c262d;
    --rose: #c98a90;
    --rose-soft: #e9c3c2;
    --ink: #4a3b38;
    --gold: #b98a52;
    --shadow: rgba(92, 38, 45, 0.18);
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0;
    padding:0;
    min-height:100vh;
  }

  body{
    font-family: 'Jost', sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 15% 10%, #fff7f2 0%, transparent 45%),
      radial-gradient(circle at 85% 90%, #f3d9d4 0%, transparent 50%),
      linear-gradient(160deg, var(--paper) 0%, var(--paper-2) 100%);
    min-height: 100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding: 28px 18px;
    overflow-x:hidden;
  }

  /* ambient petals — quiet, not scattered everywhere */
  .petal{
    position:fixed;
    top:-40px;
    font-size: 16px;
    color: var(--rose);
    opacity:0.55;
    pointer-events:none;
    animation: drift linear infinite;
    z-index:0;
  }
  @keyframes drift{
    to{ transform: translateY(112vh) translateX(24px) rotate(180deg); }
  }

  /* ===== envelope / letter container ===== */
  .stage{
    position:relative;
    width:100%;
    max-width: 380px;
    z-index:1;
  }

  .envelope-flap{
    position:absolute;
    top:-1px;
    left:50%;
    transform: translateX(-50%);
    width: 92%;
    height: 90px;
    background: linear-gradient(135deg, var(--rose-soft), var(--rose));
    clip-path: polygon(0 0, 100% 0, 50% 92%);
    border-radius: 4px 4px 0 0;
    box-shadow: 0 6px 18px var(--shadow);
    z-index: 2;
    transform-origin: top center;
    animation: openFlap 1.4s 0.3s cubic-bezier(.6,0,.35,1) both;
  }

  @keyframes openFlap{
    0%{ transform: translateX(-50%) rotateX(0deg); }
    100%{ transform: translateX(-50%) rotateX(178deg); }
  }

  .seal{
    position:absolute;
    top: 44px;
    left:50%;
    transform: translateX(-50%);
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #a24450, var(--wine-deep));
    display:flex;
    align-items:center;
    justify-content:center;
    color:#f4d9c9;
    font-size: 18px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.25), inset 0 1px 2px rgba(255,255,255,0.25);
    z-index: 3;
    animation: sealFade 0.5s 0.2s both;
    font-family: 'Cormorant Garamond', serif;
  }
  @keyframes sealFade{
    from{ opacity:1; }
    to{ opacity:1; }
  }

  .card{
    position:relative;
    background: #fffaf6;
    border-radius: 6px;
    padding: 56px 30px 34px;
    box-shadow:
      0 22px 45px var(--shadow),
      0 2px 6px rgba(0,0,0,0.06);
    text-align:center;
    opacity:0;
    animation: riseIn 0.9s 1.1s cubic-bezier(.2,.8,.2,1) forwards;
    border: 1px solid #f0dcd4;
  }
  .card::before{
    content:"";
    position:absolute;
    inset: 10px;
    border: 1px solid #e9cfc4;
    border-radius: 3px;
    pointer-events:none;
  }

  @keyframes riseIn{
    from{ opacity:0; transform: translateY(18px); }
    to{ opacity:1; transform: translateY(0); }
  }

  .frame{
    width: 180px;
    height: 180px;
    margin: 0 auto 24px;
    position:relative;
    padding: 8px;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 12px 26px var(--shadow);
    transform: rotate(-2deg);
  }
  .frame img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius: 4px;
    display:block;
  }
  .frame::after{
    content:"";
    position:absolute;
    inset:-8px;
    border-radius: 14px;
    border: 1.5px dashed var(--rose);
    opacity:0.6;
    pointer-events:none;
  }

  .eyebrow{
    font-family:'Jost', sans-serif;
    font-size: 11px;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: var(--rose);
    margin-bottom: 10px;
    font-weight: 500;
  }

  h1{
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 30px;
    color: var(--wine-deep);
    margin: 0 0 20px;
    line-height:1.25;
  }
  h1 em{
    font-style: italic;
    color: var(--wine);
  }

  .divider{
    width: 46px;
    height: 1px;
    background: var(--rose);
    margin: 0 auto 22px;
    opacity: 0.7;
  }

  p.letter{
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18.5px;
    line-height: 1.75;
    color: #5a4844;
    margin: 0 0 28px;
  }

  .signature{
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    color: var(--rose);
    margin: -10px 0 26px;
    letter-spacing: 0.5px;
  }

  .btn-musica{
    font-family: 'Jost', sans-serif;
    background: var(--wine);
    color: #fdf1ec;
    border: none;
    padding: 13px 28px;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(124, 58, 66, 0.35);
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.3s ease;
    display:inline-flex;
    align-items:center;
    gap:8px;
  }
  .btn-musica:active{
    transform: scale(0.96);
  }
  .btn-musica.playing{
    background: var(--wine-deep);
  }
  .note-icon{
    display:inline-block;
    transition: transform 0.3s ease;
  }
  .btn-musica.playing .note-icon{
    animation: bob 0.9s ease-in-out infinite;
  }
  @keyframes bob{
    0%,100%{ transform: translateY(0); }
    50%{ transform: translateY(-3px); }
  }

  @media (prefers-reduced-motion: reduce){
    .petal, .envelope-flap, .card, .btn-musica.playing .note-icon{
      animation: none !important;
    }
    .card{ opacity:1; }
  }

  @media (max-width: 360px){
    .card{ padding: 50px 22px 30px; }
    h1{ font-size: 26px; }
    p.letter{ font-size: 17px; }
    .frame{ width: 150px; height: 150px; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="envelope-flap"></div>
  <div class="seal">&#10084;</div>

  <div class="card">
    <div class="frame">
      <!-- AQUÍ VA TU FOTO: reemplaza "nosotros.jpg" por el nombre de tu imagen -->
      <img src="1.jpeg" alt="Nosotros">
    </div>

    <div class="eyebrow">Una carta para ti</div>
    <h1>Para la mujer que<br><em>lo cambió todo</em></h1>
    <div class="divider"></div>

    <!-- Tu texto personalizado -->
    <p class="letter">
      Desde que estás en mi vida, cada día es más bonito. Gracias por ser mi apoyo, mi sonrisa y mi lugar seguro. Este es solo un pequeño detalle para recordarte lo muchísimo que te amo.
    </p>
    <div class="signature">— con todo mi corazón</div>

    <button class="btn-musica" id="playBtn">
      <span class="note-icon">&#9835;</span>
      <span class="btn-label">Escucha esto</span>
    </button>
  </div>
</div>

<!-- Elemento de audio -->
<audio id="background-music" loop>
  <source src="No Se Ocupa Más mp3.mp3" type="audio/mpeg">
  Tu navegador no soporta este elemento de audio.
</audio>

<script>
  // Pétalos ambientales, sutiles y pocos
  const stageParent = document.body;
  const petalChars = ['❀','❁','♥'];
  const total = window.matchMedia('(prefers-reduced-motion: reduce)').matches ? 0 : 7;
  for(let i=0; i<total; i++){
    const p = document.createElement('span');
    p.className = 'petal';
    p.textContent = petalChars[i % petalChars.length];
    p.style.left = Math.random()*100 + 'vw';
    p.style.fontSize = (12 + Math.random()*10) + 'px';
    p.style.animationDuration = (9 + Math.random()*8) + 's';
    p.style.animationDelay = (Math.random()*10) + 's';
    stageParent.appendChild(p);
  }

  const music = document.getElementById('background-music');
  const playBtn = document.getElementById('playBtn');
  const label = playBtn.querySelector('.btn-label');

  function setPlayingUI(isPlaying){
    if(isPlaying){
      label.textContent = 'Suena para ti';
      playBtn.classList.add('playing');
    } else {
      label.textContent = 'Escucha esto';
      playBtn.classList.remove('playing');
    }
  }

  function tryPlay(){
    return music.play().then(() => {
      setPlayingUI(true);
      return true;
    }).catch(() => {
      setPlayingUI(false);
      return false;
    });
  }

  // Intento de reproducción automática al cargar la página.
  // La mayoría de los navegadores (sobre todo en celular) bloquean el
  // autoplay con sonido hasta que la persona toca la pantalla al menos
  // una vez. Por eso, si el intento automático falla, la música arranca
  // en el primer toque/clic en cualquier parte de la página.
  window.addEventListener('load', () => {
    tryPlay().then(started => {
      if(!started){
        const startOnFirstTouch = () => {
          tryPlay();
          document.removeEventListener('click', startOnFirstTouch);
          document.removeEventListener('touchstart', startOnFirstTouch);
        };
        document.addEventListener('click', startOnFirstTouch, { once: true });
        document.addEventListener('touchstart', startOnFirstTouch, { once: true });
      }
    });
  });

  playBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (music.paused) {
      tryPlay();
    } else {
      music.pause();
      setPlayingUI(false);
    }
  });
</script>

</body>
</html>
